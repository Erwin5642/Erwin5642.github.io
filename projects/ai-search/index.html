<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Visualizador de Buscas</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<aside class="toolbar">

    <section class="panel">
        <label class="panel-title" for="problem-select">Problema:</label>
        <select id="problem-select" class="form-select"></select>
    </section>

    <section class="panel">
        <label class="panel-title" for="algo-select">Busca selecionada:</label>
        <select id="algo-select" class="form-select">
            <optgroup label="Não Informadas">
                <option value="bfs" selected>Busca em Largura (BFS)</option>
                <option value="dfs">Busca em Profundidade (DFS)</option>
                <option value="dijkstra">Busca de Custo Uniforme (Dijkstra)</option>
                <option value="dls">Busca com Profundidade Limitada (DLS)</option>
                <option value="ids">Busca em Profundidade Iterativa (IDS) </option>
            </optgroup>

            <optgroup label="Informadas">
                <option value="astar">Busca A-Estrela (A*)</option>
                <option value="greedy">Busca Gulosa (Greedy)</option>
                <option value="idastar">Busca A-Estrela com Aprofundamento Iterativo (IDA*)</option>
                <option value="rbfs">Busca de Melhor Escolha Recursiva (RBFS)</option>
            </optgroup>
        </select>
    </section>

    <section class="panel" id="heuristic-panel" hidden>
        <label class="panel-title" for="heuristic-select">Heurística:</label>
        <select id="heuristic-select" class="form-select"></select>
    </section>

    <section class="panel">
        <h3 class="panel-title">Estado inicial</h3>
        <div id="initial-input-container"></div>
    </section>

    <section class="panel">
        <h3 class="panel-title">Estado final</h3>
        <div id="end-input-container"></div>
    </section>

    <section class="panel">
        <h3 class="panel-title">Simulação</h3>
        <div class="btn-group">
            <button id="btn-start" class="btn btn-success">Começar</button>
            <button id="btn-toggle" class="btn btn-warning">Resumir</button>
            <button id="btn-reset" class="btn btn-danger">Resetar</button>
            <label class="panel-title" for="step-interval-slider">Velocidade</label>
            <input id="step-interval-slider" type="range" min="0" max="100" value="50" step="1" class="slider">
            <div id="step-interval-ms" class="slider-ms"></div>
        </div>
    </section>




</aside>

<main class="canvas-container">
    <canvas id="graphCanvas"></canvas>
</main>

<script type="module" src="js/main.js"></script>
</body>
</html>
